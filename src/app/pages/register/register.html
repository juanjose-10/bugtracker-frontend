<div class="auth-container">

  <div class="auth-card">

    <h2>Crear cuenta</h2>

    <input
      type="text"
      placeholder="Nombre"
      [(ngModel)]="nombre"
    >

    <input
      type="email"
      placeholder="Correo"
      [(ngModel)]="email"
    >

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    >

    <select [(ngModel)]="rol">

      <option value="">
        Seleccione un rol
      </option>

      <option value="Administrador">
        Administrador
      </option>

      <option value="QA">
        QA
      </option>

      <option value="Desarrollador">
        Desarrollador
      </option>

    </select>

    <button class="btn" (click)="register()">
      Registrarse
    </button>

    <p class="message">
      {{ mensaje }}
    </p>

    <div class="link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">
        Iniciar sesión
      </a>
    </div>

  </div>

</div>
